name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: src/AccountingERP.API
          push: false
          tags: accounting-erp-api:latest
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: accounting-erp-frontend:latest
